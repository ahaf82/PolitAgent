name: PolitAgent Session Crawler

on:
  schedule:
    # Runs everyday at 04:00 UTC (06:00 German time)
    - cron: '0 4 * * *'
  workflow_dispatch:
    # Allows manual trigger from the Actions tab

permissions:
  contents: write

jobs:
  crawl-and-analyze:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run Crawler Pipeline
      env:
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      run: |
        # Run the python crawler
        python crawler.py

    - name: Commit and Push Changes
      run: |
        # Check if there are any changes in data/ or protocols/
        git status --porcelain
        if [ -n "$(git status --porcelain docs/)" ]; then
          echo "Changes detected. Committing..."
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/data/sessions.json docs/protocols/
          git commit -m "Auto-update: Neue Bundestag Protokolle hinzugefügt [skip ci]"
          git push
          echo "Changes successfully pushed."
        else
          echo "No new sessions found. Nothing to commit."
        fi
